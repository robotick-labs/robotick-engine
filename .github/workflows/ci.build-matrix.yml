name: CI - Build Matrix (Linux + ESP32-S3)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    name: Build & Test (${{ matrix.platform }} - ${{ matrix.preset }})

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            preset: robotick-engine-tests-linux-debug
            docker_image: ghcr.io/robotick-labs/robotick-ubuntu24.04-native-linux:latest
            run_tests: true
          - platform: linux
            preset: robotick-engine-tests-linux-release
            docker_image: ghcr.io/robotick-labs/robotick-ubuntu24.04-native-linux:latest
            run_tests: false
          - platform: linux-arm64
            preset: robotick-engine-linux-arm64
            docker_image: ghcr.io/robotick-labs/robotick-debian12-cross-linux-arm64:latest
            run_tests: false
          - platform: linux-arm32
            preset: robotick-engine-linux-arm32
            docker_image: ghcr.io/robotick-labs/robotick-debian12-cross-linux-arm32:latest
            run_tests: false
          - platform: esp32s3
            preset: esp32s3
            docker_image: ghcr.io/robotick-labs/robotick-idf5.4-esp32:latest
            run_tests: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare Docker image
        run: docker pull ${{ matrix.docker_image }}

      - name: Run Build inside Docker
        run: |
          docker run --rm --init \
            --user root \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.docker_image }} \
            bash -c "
              set -Eeuo pipefail
              export TERM=xterm-256color
              set -x

              if [ '${{ matrix.platform }}' == 'esp32s3' ]; then
                echo '🚧 ESP32-S3 Setup'
                cd tools/esp32-compile-check

                bash /workspace/tools/make_esp32_symlinks.sh
                ./1_idf_clean.sh || (echo '❌ Idf Clean failed' && exit 1)
                ./2_idf_build.sh || (echo '❌ Idf Build failed' && exit 1)

              else
                echo '🚧 Linux Setup'
                mkdir -p .cmake
                cmake --preset ${{ matrix.preset }}
                cmake --build --preset ${{ matrix.preset }} -j$(nproc)

                if [ '${{ matrix.run_tests }}' = 'true' ]; then
                  ctest --test-dir build/${{ matrix.preset }}/cpp/tests --output-on-failure --timeout 120 --fail-if-no-tests -j$(nproc)
                fi
              fi
            "
